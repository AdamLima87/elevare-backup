name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run test

      # NOTE: `bun run lint` is intentionally not run here yet — the codebase
      # currently has ~2000 pre-existing lint/formatting errors unrelated to
      # this workflow. Re-enable once that debt is addressed separately.
